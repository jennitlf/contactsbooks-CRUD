services:
  db:
    image: postgres:18
    container_name: contactsbook
    restart: always
    ports:
      - "5434:5432"
    volumes:
       - .docker/postgresql:/var/lib/postgresql
    env_file:
        .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}